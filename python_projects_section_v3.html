  .py-section { background: #0d1117; padding: 40px 32px 48px; font-family: 'Exo 2', sans-serif; border-radius: 12px; }

  .py-card { border-radius: 10px; overflow: hidden; aspect-ratio: 16/9; border: 1px solid #3b82f6; background: #161b22; display: flex; align-items: center; justify-content: center; }
