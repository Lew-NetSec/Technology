<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CCNA Visual Cards · LNS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page:    #0A0E14;
    --bg-sidebar: #0D1420;
    --bg-card:    #FFFFFF;
    --border-s:   rgba(255,255,255,0.07);
    --border-c:   rgba(0,0,0,0.12);
    --text-page:  #c9d1d9;
    --text-muted: #6e7681;
    --accent:     #0A74D4;
    --accent-bg:  rgba(10,116,212,0.13);
    --sidebar-w:  260px;

    /* Layer colour system — deeper, more saturated */
    --l1: #ECEAE0; --l1t: #3D3C38;
    --l2: #FFE4DB; --l2t: #882E12;
    --l3: #FFF6DC; --l3t: #B87000;
    --l4: #D8F5EC; --l4t: #0A5C47;
    --l57: #E8F0FF; --l57t: #5B36C4;
    --sec: #FFE0E0; --sect: #9B1C1C;
    --gen: #E0EFFF; --gent: #0A74D4;

    /* Card colours */
    --card: #FFFFFF;
    --text: #0F0F0D;
    --muted: #4A4A46;
    --shadow: 0 2px 6px rgba(0,0,0,0.10), 0 8px 28px rgba(0,0,0,0.09);
    --radius: 14px;

    /* Semantic palette — CLI sheet inspired */
    --blue:       #0A74D4;   --blue-bg:   #E0EFFF;
    --teal:       #0A8E82;   --teal-bg:   #DCF7F4;
    --green:      #1A8A40;   --green-bg:  #D8F5EC;
    --gold:       #B87000;   --gold-bg:   #FFF6DC;
    --orange:     #C85A00;   --orange-bg: #FFF0E6;
    --red:        #9B1C1C;   --red-bg:    #FFE0E0;
    --purple:     #5B36C4;   --purple-bg: #EEEAFF;
    --grey:       #3D3C38;   --grey-bg:   #ECEAE0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-page);
    color: var(--text-page);
    min-height: 100vh;
    display: flex;
  }

  /* ── SIDEBAR ──────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-s);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 200;
    transition: transform 0.25s ease;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .sidebar::-webkit-scrollbar { width: 0; }

  .sidebar-brand {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border-s);
    flex-shrink: 0;
  }
  .brand-logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.06em;
    display: block;
    margin-bottom: 2px;
  }
  .brand-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .nav-section {
    padding: 0;
    flex-shrink: 0;
  }
  .nav-section-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 14px 18px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    transition: color .15s;
  }
  .nav-section-label:hover { color: var(--text-page); }
  .nav-section-label .ns-arrow {
    font-size: 8px;
    opacity: 0.5;
    transition: transform .2s;
  }
  .nav-section.collapsed .ns-arrow { transform: rotate(-90deg); }
  .nav-section.collapsed .nav-section-items { display: none; }
  .nav-section-items { display: block; padding-bottom: 6px; }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: none;
    border: none;
    padding: 8px 18px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    text-align: left;
    transition: color 0.15s, background 0.15s;
    border-radius: 0;
    white-space: nowrap;
    position: relative;
  }
  .nav-btn:hover {
    color: var(--text-page);
    background: rgba(255,255,255,0.04);
  }
  .nav-btn.active {
    color: var(--accent);
    background: var(--accent-bg);
  }
  .nav-btn.active::before {
    content: '';
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 2px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .nav-icon {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 5px;
    flex-shrink: 0;
    width: 32px;
    text-align: center;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 18px;
    border-top: 1px solid var(--border-s);
    flex-shrink: 0;
  }
  .sidebar-footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .sidebar-footer-text a {
    color: var(--accent);
    text-decoration: none;
  }

  /* ── MOBILE TOGGLE ────────────────────────────── */
  .mobile-header {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border-s);
    z-index: 300;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
  }
  .hamburger {
    background: none;
    border: 1px solid var(--border-s);
    border-radius: 7px;
    width: 36px; height: 36px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .hamburger span {
    display: block;
    width: 16px; height: 1.5px;
    background: var(--text-page);
    border-radius: 2px;
    transition: all 0.2s;
  }
  .mobile-brand {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .mobile-card-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 190;
    backdrop-filter: blur(2px);
  }
  .overlay.visible { display: block; }

  /* ── MAIN CONTENT ─────────────────────────────── */
  .main-content {
    margin-left: var(--sidebar-w);
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }


  main {
    padding: 28px 40px 60px;
    max-width: 900px;
    width: 100%;
  }

  /* ── CARD (always white) ──────────────────────── */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1.5px solid rgba(0,0,0,0.12);
    overflow: hidden;
    animation: fadeUp 0.22s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 22px 22px 18px;
    border-bottom: 1px solid var(--border-c);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .icon-badge {
    width: 46px; height: 46px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .topic-name {
    font-size: 21px;
    font-weight: 600;
    flex: 1;
    min-width: 120px;
    color: var(--text);
  }
  .badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .badge:hover { opacity: 0.75; }
  .badge.no-click { cursor: default; }
  .badge.no-click:hover { opacity: 1; }

  .card-body { padding: 26px 28px; }

  .oneliner {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 16px;
  }

  .hook-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hook-box {
    border-left: 4px solid var(--teal);
    padding: 11px 16px;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--teal);
    font-style: italic;
    line-height: 1.65;
    background: var(--teal-bg);
    border-radius: 0 6px 6px 0;
  }

  .visual-wrap {
    margin-bottom: 18px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border-c);
  }

  .terms-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
  }
  .term-pill {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border: 1.5px solid transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .term-pill:hover { opacity: 0.8; transform: translateY(-1px); }
  .term-pill.static { cursor: default; }
  .term-pill.static:hover { opacity: 1; transform: none; }

  .trap-box {
    background: var(--sec);
    border: 1.5px solid rgba(155,28,28,0.30);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .trap-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--sect);
    letter-spacing: 0.02em;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .trap-text {
    font-size: 13px;
    color: var(--sect);
    line-height: 1.55;
  }

  .related-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border-c);
  }
  .related-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .related-cards {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .related-card {
    flex: 1;
    min-width: 120px;
    background: #f8f8f6;
    border: 1.5px solid rgba(0,0,0,0.13);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .related-card:hover {
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transform: translateY(-1px);
  }
  .rc-icon {
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
    margin-bottom: 5px;
    display: inline-block;
  }
  .rc-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .rc-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }





  svg text { font-family: 'DM Sans', sans-serif; }
  svg text.mono { font-family: 'DM Mono', monospace; }

  /* ── SIDEBAR SEARCH ──────────────────────────── */
  .sidebar-search { padding: 10px 14px; border-bottom: 1px solid var(--border-s); flex-shrink: 0; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 12px; pointer-events: none; }
  .search-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-s); border-radius: 7px; padding: 6px 10px 6px 26px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text-page); outline: none; transition: border .15s; }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); }
  .nav-btn.hidden { display: none; }


  /* ── EXTRA SECTIONS — collapsible ───────────────── */
  .extra-section { margin-bottom: 6px; }
  .extra-section summary {
    display: flex; align-items: center; gap: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 11px;
    font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .02em;
    margin: 14px 0 0; cursor: pointer; list-style: none;
    padding: 8px 12px; border-radius: 8px;
    background: #F0F3F7; border: 1.5px solid rgba(0,0,0,0.12);
    transition: background .15s, color .15s; user-select: none;
  }
  .extra-section summary::-webkit-details-marker { display: none; }
  .extra-section summary:hover { background: #e8eaed; color: var(--text); }
  .extra-section summary::before {
    content: '▶'; font-size: 8px; color: var(--muted);
    transition: transform .2s; flex-shrink: 0;
  }
  .extra-section[open] summary::before { transform: rotate(90deg); }
  .extra-section[open] summary {
    border-radius: 8px 8px 0 0; margin-bottom: 0;
    border-bottom: none;
  }
  .extra-section-body {
    background: #F0F3F7; border: 1.5px solid rgba(0,0,0,0.12);
    border-top: none; border-radius: 0 0 8px 8px;
    padding: 14px 16px; margin-bottom: 0;
  }



  /* ── RESPONSIVE ───────────────────────────────── */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .mobile-header { display: flex; }
    .main-content { margin-left: 0; padding-top: 52px; }
    main { padding: 14px 16px 60px; }
    .card-header { padding: 16px 16px 14px; gap: 10px; }
    .card-body { padding: 16px 16px; }
    .topic-name { font-size: 18px; }
    .icon-badge { width: 42px; height: 42px; }
    .oneliner { font-size: 15px; }
    .hook-box { font-size: 13px; }
    .trap-text { font-size: 13px; }
    .extra-section-body { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  }

  @media (max-width: 480px) {
    main { padding: 10px 10px 60px; }
    .card-header { padding: 14px 12px 12px; }
    .card-body { padding: 14px 12px; }
    .topic-name { font-size: 17px; }
    .term-pill { font-size: 12px; padding: 5px 11px; }
  }
</style>
</head>
<body>

<!-- Mobile header -->
<div class="mobile-header" id="mobileHeader">
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
  <span class="mobile-brand">LNS · CCNA</span>

</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-logo">LNS</span>
    <span class="brand-sub">CCNA 200-301 · Visual Cards</span>
  </div>

  <div class="sidebar-search">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="sidebarSearch" type="text" placeholder="Search cards…" oninput="filterNav(this.value)">
    </div>

  <nav class="nav-section">
    <span class="nav-section-label" onclick="toggleNavSection(this.parentElement)">

    </span>
    <div class="nav-section-items">
      <button class="nav-btn" onclick="showHome()" data-id="__home">

  <nav class="nav-section">

      </button>
      <button class="nav-btn" onclick="showCard('switch')" data-id="switch">
        <span class="nav-icon" style="background:#FFE4DB;color:#882E12">SW</span>
        Switch
      </button>
      <button class="nav-btn" onclick="showCard('firewall')" data-id="firewall">
        <span class="nav-icon" style="background:#FFE0E0;color:#9B1C1C">FW</span>

      </button>
      <button class="nav-btn" onclick="showCard('wap')" data-id="wap">

  <nav class="nav-section">

    </span>
    <div class="nav-section-items">

      </button>
      <button class="nav-btn" onclick="showCard('ip')" data-id="ip">

      </button>
      <button class="nav-btn" onclick="showCard('ports')" data-id="ports">

      </button>

  <nav class="nav-section">
    <span class="nav-section-label" onclick="toggleNavSection(this.parentElement)">
      Week 1 <span class="ns-arrow">▾</span>
    </span>
    <div class="nav-section-items">
      <button class="nav-btn" onclick="showCard('s00l00')" data-id="s00l00">
        <span class="nav-icon" style="background:#E0EFFF;color:#0A74D4">L0</span>
        Lesson 0
      </button>
      <button class="nav-btn" onclick="showCard('s00l01')" data-id="s00l01">
        <span class="nav-icon" style="background:#FFE4DB;color:#882E12">L1</span>
        Lesson 1
      </button>
      <button class="nav-btn" onclick="showCard('w1l3')" data-id="w1l3">
        <span class="nav-icon" style="background:#FFF6DC;color:#B87000">L2</span>
        Lesson 2
      </button>
      <button class="nav-btn" onclick="showCard('w1l4')" data-id="w1l4">
        <span class="nav-icon" style="background:#EEEAFF;color:#5B36C4">L3</span>
        Lesson 3
      </button>
      <button class="nav-btn" onclick="showCard('w1l5')" data-id="w1l5">
        <span class="nav-icon" style="background:#D8F5EC;color:#0A5C47">L4</span>
        Lesson 4
      </button>
      <button class="nav-btn" onclick="showCard('w1l6')" data-id="w1l6">

  <div class="sidebar-footer">
    <div class="sidebar-footer-text">
      <a href="https://lew-netsec.github.io" target="_blank">lew-netsec.github.io</a><br>
      CCNA 200-301 Study Cards
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main-content">
  <main id="main"></main>
</div>

<script>
/*
  /card GENERATION STANDARD — apply every time a new card is created

  REQUIRED FIELDS on every card:
    icon, iconBg, iconColor          — 2-char label + colours
    name                             — full card title
    layerLabel, layerBg, layerColor  — OSI/context badge
    layerTarget                      — id to link to, or null
    objLabel, objBg, objColor        — week/lesson or exam obj badge
    oneliner                         — one exam-ready sentence
    hook                             — 1-2 sentence memory hook, punchy
    visual                           — SVG diagram (see VISUAL RULES below)
    extraSections[]                  — array of { label, content } objects (see below)
    terms[]                          — { label, bg, color, target? } key term pills
    trap                             — string, all exam traps for this topic
    related[]                        — { id, icon, iconBg, iconColor, name, desc }

  REMOVED — do NOT include on any card:
    recall / recallAnswer            — removed
    isFault / faultPrompt / faultAnswer — removed

  VISUAL RULES — SVG diagrams:
    - Always animated with CSS @keyframes — slow, purposeful, not decorative
    - Use width:100% so SVG scales to fill the card — NO scroll wrapper divs needed
    - SVG format: <svg viewBox="0 0 W H" style="width:100%;display:block;background:#EBEEF3">
    - Font sizes inside SVG: 8px minimum, 9-11px standard labels, 12-13px headings
    - Use background:#F5F4F0 on SVG element (panels use #EBEEF3) (or #F5F4F0 for dark-background diagrams)


  EXTRA SECTIONS — collapsed by default, tap label to expand:
    1. Step-by-step walkthrough      — numbered, every step from the notes
    2. Misconception / before-after  — visual showing what students get wrong
    3. Comparison table              — wherever two things are contrasted
    4. Decision / flow diagram       — wherever notes describe a branching process
    5. Scale / real-world context    — lab vs production, home vs enterprise
    6. CLI / config block            — wherever commands are mentioned
    Each section: { label: 'Section title', content: `<html string>` }
    Sections are HIDDEN by default — card stays lean (diagram + hook + terms + trap)
    Tables in extra sections: <div style="overflow-x:auto">...<table style="min-width:480px">
    Panel backgrounds: always #EBEEF3

        content: `<p style="font-size:13px;color:#1a1a18;line-height:1.7;margin-bottom:8px">Routers only care about IP addresses (Layer 3), not MAC addresses. The switch handles devices on the same network — the router gets you off it. Your <strong>default gateway</strong> is simply the router's IP on your subnet — not a mysterious separate device. Students frequently think these are different things.</p><p style="font-size:13px;color:#1a1a18;line-height:1.7">IP address never changes end-to-end. MAC address is rebuilt with new src/dst at every router hop. The router strips the incoming L2 frame, reads the L3 destination, checks its routing table, then builds a brand-new L2 frame for the next segment.</p>`

        label: 'Why this matters — exam context',
        content: `<p style="font-size:13px;color:#1a1a18;line-height:1.7;margin-bottom:8px">Switches operate exclusively at Layer 2 — they read MAC addresses and forward frames. They never look at IP addresses. A hub has no intelligence and floods every port every time — a switch only floods when the destination MAC is unknown (unknown unicast flooding), then learns and forwards directly thereafter.</p><p style="font-size:13px;color:#1a1a18;line-height:1.7">The PDU at Layer 2 is called a <strong>frame</strong>, not a packet. Wireless behaves like a hub — all devices in range share the medium, which is why wired beats Wi-Fi for latency-sensitive devices.</p>`

      {
        label: 'Why this matters — exam context',
        content: `<p style="font-size:13px;color:#0F0F0D;line-height:1.7;margin-bottom:8px"><strong>FTP 20 vs 21</strong> — Port 20 is the data channel, port 21 is control/commands. These are very easy to swap under exam pressure. FTP requires login and uses TCP. TFTP on port 69 uses UDP with no authentication — only appropriate on trusted internal networks for IOS image transfers.</p>
<p style="font-size:13px;color:#0F0F0D;line-height:1.7;margin-bottom:8px"><strong>DNS uses both TCP and UDP on port 53</strong> — UDP for normal queries (fast, low overhead), TCP for zone transfers when the response exceeds 512 bytes. The exam will test whether you know both.</p>
<p style="font-size:13px;color:#0F0F0D;line-height:1.7;margin-bottom:8px"><strong>DHCP 67 vs 68</strong> — Port 67 is the server port. Port 68 is the client port. The server does NOT receive on 68. Direction matters.</p>
<p style="font-size:13px;color:#0F0F0D;line-height:1.7;margin-bottom:8px"><strong>SNMP 161 vs 162</strong> — Port 161 is where the agent listens (manager polls agent). Port 162 is where the manager listens for traps (agent sends unsolicited alerts). Direction is a favourite trick question.</p>
<p style="font-size:13px;color:#0F0F0D;line-height:1.7"><strong>TACACS+ vs RADIUS</strong> — TACACS+ (TCP 49) encrypts the entire packet and separates authentication, authorisation and accounting. RADIUS (UDP 1812/1813) only encrypts the password and combines authorisation and accounting. TACACS+ is Cisco proprietary. RADIUS is the open standard.</p>`

        content: `<p style="font-size:13px;color:#1a1a18;line-height:1.7;margin-bottom:8px">Firewalls are NOT routers — they do not route between networks by default. ACLs on a Cisco router are not the same as a full stateful firewall. A <strong>stateful</strong> firewall tracks active connection state and can block unsolicited inbound packets even if their headers would pass a stateless rule. A <strong>stateless</strong> firewall just pattern-matches headers.</p><p style="font-size:13px;color:#1a1a18;line-height:1.7">ACL rules are processed top-down — first match wins and processing stops. A broad permit rule early in the list will match before specific deny rules below it, making those deny rules unreachable. An implicit <strong>deny any any</strong> exists at the end of every ACL even when not written.</p>`

            <div style="font-size:12px;color:#5B36C4;line-height:1.7">The <strong>troubleshooting language.</strong> Engineers say "Layer 1 issue" or "Layer 7 problem" all day long — even when the actual traffic uses TCP/IP. OSI gives a clean, shared vocabulary. It never became the practical standard but it won the terminology war.</div>

          <p style="margin-bottom:10px">Early networking was a proprietary mess. IBM had its own system. Other vendors had others. Their devices couldn't talk to each other — like trying to plug the wrong charger into your phone. Cool tech, useless at scale.</p>
          <p style="margin-bottom:10px">ARPANET (1960s, U.S. Dept of Defense) proved computers could communicate across a network using <strong>packet switching</strong> — breaking data into chunks, sending them independently, reassembling at the destination. Revolutionary concept, but no agreed standard yet.</p>
          <p>Eventually everyone realised: without shared rules, networking would stay a collection of incompatible islands. That realisation produced the models. TCP/IP became the open standard. OSI became the reference framework. Together they made universal networking possible.</p>

<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>Browser sends HTTPS request (L7).</strong> Application data is created. Protocol: HTTPS. Port 443 will be used.</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>TCP header added (L4).</strong> Src port (random ephemeral), dst port 443, sequence number. Data + TCP header = <strong>segment</strong>.</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>IP header added (L3).</strong> Src IP (Johnny's PC), dst IP (coffee server). Segment + IP header = <strong>packet</strong>.</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>Ethernet header + FCS added (L2).</strong> Src MAC (Johnny's NIC), dst MAC (default gateway/router). Packet + L2 header + trailer = <strong>frame</strong>.</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>Frame transmitted as bits (L1).</strong> Electrical signal on the wire.</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>Switch receives frame (L2).</strong> Reads dst MAC, forwards out correct port. Does not open L3 or higher.</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>Router receives frame (L2+L3).</strong> dst MAC = its own → strip L2. Read dst IP → check routing table → build NEW frame with new MACs for next hop.</li>
<li style="font-size:13px;color:#1a1a18"><strong>Server receives and de-encapsulates (L1→L7).</strong> Confirms MAC ✓ → strip L2. Confirms IP ✓ → strip L3. TCP port 443 → hand to HTTPS service. Application reads the request and builds a response. The whole process runs in reverse.</li>
</ol>`

<div style="margin-top:8px;font-size:12px;color:#3D3C38;line-height:1.6;padding:10px 12px;background:#EBEEF3;border-radius:8px;border:1px solid rgba(0,0,0,0.07)">The <strong>ephemeral source port</strong> is a temporary port your OS picks for each outbound connection (typically 49152–65535). When the server sends data back, it addresses it to your IP + that ephemeral port so your OS knows which app gets it. That's how you can run YouTube, Spotify and ten browser tabs simultaneously without the responses getting mixed up.</div>`

<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>L7 Application.</strong> Browser requests youtube.com. DNS resolves to an IP. HTTPS protocol selected.</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>L6 Presentation.</strong> TLS handshake encrypts the connection. Both sides agree on cipher suite and format.</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>L5 Session.</strong> Session opened and tracked. Your logged-in state persists across all the sub-requests (page HTML, thumbnails, player, ads).</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>L4 Transport — page load (TCP).</strong> 3-way handshake. HTML, CSS, JS delivered reliably to dst port 443. ACKs confirm receipt.</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>L4 Transport — video stream (UDP).</strong> Video chunks sent fast to your browser. Lost chunk? Player keeps going. Buffering beats freezing.</li>
<li style="font-size:13px;color:#1a1a18;margin-bottom:5px"><strong>L3 Network.</strong> IP packets routed across the internet to YouTube's CDN IP.</li>
<li style="font-size:13px;color:#1a1a18"><strong>L2 / L1.</strong> Frames and bits delivered hop-by-hop to your device. MAC addresses rebuilt at each router.</li>
</ol>`

        label: 'Why this matters — exam context',
        content: `<p style="font-size:13px;color:#1a1a18;line-height:1.7;margin-bottom:8px">TCP/IP collapses L5+L6+L7 into a single Application layer — but the work still happens. TLS/SSL is a Layer 6 (Presentation) function even though it's commonly described as "Application layer" in TCP/IP terms. The session persists across multiple TCP connections (Layer 5).</p><p style="font-size:13px;color:#1a1a18;line-height:1.7;margin-bottom:8px">TCP is NOT "better" than UDP — they solve different problems. UDP is preferred for real-time traffic (video, voice, gaming) where a lost packet is acceptable but delay is not. TCP is preferred where every byte must arrive correctly (file transfer, web pages, email, logins).</p><p style="font-size:13px;color:#1a1a18;line-height:1.7">The <strong>ephemeral source port</strong> (typically 49152–65535) is how your OS knows which application gets the returning traffic. Without it, YouTube, Spotify and your browser tabs would all receive each other's responses. Same destination IP + same destination port — different source ports = different conversations.</p>`

function showCard(id) {
  if (!CARDS[id]) return;
  current = id;
  renderCard(id);
  updateNav(id);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  closeSidebar();
  document.getElementById('mobileCardName').textContent = CARDS[id].name;
}

function renderCard(id) {
  const c = CARDS[id];
  const main = document.getElementById('main');



  const extraHtml = (c.extraSections || []).map(s => {
    return `<details class="extra-section">
      <summary>${s.label}</summary>
      <div class="extra-section-body">${s.content}</div>
    </details>`;
  }).join('');

  const visualHtml = c.visual ? `<div class="visual-wrap">${c.visual}</div>` : '';


  main.innerHTML = `<div class="card">
    <div class="card-header">
      <div class="icon-badge" style="background:${c.iconBg};color:${c.iconColor}">${c.icon}</div>
      <span class="topic-name">${c.name}</span>
      ${c.layerTarget
        ? `<span class="badge" style="background:${c.layerBg};color:${c.layerColor}" onclick="showCard('${c.layerTarget}')">${c.layerLabel} ↗</span>`
        : `<span class="badge no-click" style="background:${c.layerBg};color:${c.layerColor}">${c.layerLabel}</span>`}
      <span class="badge no-click" style="background:${c.objBg};color:${c.objColor}">${c.objLabel}</span>
    </div>
    <div class="card-body">
      <p class="oneliner">${c.oneliner}</p>
      <div class="hook-label">Memory hook</div><div class="hook-box">${c.hook}</div>
      ${visualHtml}
      ${extraHtml}
      <div class="hook-label">Key terms</div>
      <div class="terms-wrap">
        ${c.terms.map(t => t.target
          ? `<button class="term-pill" style="background:${t.bg};color:${t.color}" onclick="showCard('${t.target}')">${t.label} ↗</button>`
          : `<span class="term-pill static" style="background:${t.bg};color:${t.color}">${t.label}</span>`
        ).join('')}
      </div>
      <div class="trap-box">
        <div class="trap-label">⚠ Exam trap</div>
        <div class="trap-text">${c.trap}</div>
      </div>
      <div class="related-section">
        <div class="related-label">Related cards</div>
        <div class="related-cards">
          ${c.related.map(r => `<div class="related-card" onclick="showCard('${r.id}')"><span class="rc-icon" style="background:${r.iconBg};color:${r.iconColor}">${r.icon}</span><div class="rc-name">${r.name}</div><div class="rc-desc">${r.desc}</div></div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}





function updateNav(id) {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.id === id) btn.classList.add('active');
  });
}

function toggleNavSection(section) {
  section.classList.toggle('collapsed');
}

function filterNav(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.nav-btn[data-id]').forEach(btn => {
    const id = btn.dataset.id;
    if (id === '__home') { btn.classList.toggle('hidden', !!(q && !'home'.includes(q))); return; }
    const card = CARDS[id];
    const text = btn.textContent.toLowerCase();
    const terms = card ? (card.terms||[]).map(t=>t.label.toLowerCase()).join(' ') : '';
    const name = card ? card.name.toLowerCase() : '';
    const hidden = !!(q && !text.includes(q) && !terms.includes(q) && !name.includes(q));
    btn.classList.toggle('hidden', hidden);
    // Auto-expand section if a match is found inside it
    if (!hidden && q) {
      btn.closest('.nav-section')?.classList.remove('collapsed');
    }
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}
