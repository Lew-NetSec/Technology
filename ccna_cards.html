<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA Visual Cards · LNS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page:    #0d1117;
    --bg-sidebar: #10161e;
    --bg-card:    #ffffff;
    --border-s:   rgba(255,255,255,0.07);
    --border-c:   rgba(0,0,0,0.08);
    --text-page:  #c9d1d9;
    --text-muted: #6e7681;
    --accent:     #378ADD;
    --accent-bg:  rgba(55,138,221,0.12);
    --sidebar-w:  220px;
    --l1: #F1EFE8; --l1t: #5F5E5A;
    --l2: #FAECE7; --l2t: #993C1D;
    --l3: #FAEEDA; --l3t: #854F0B;
    --l4: #E1F5EE; --l4t: #0F6E56;
    --l57: #EEEDFE; --l57t: #534AB7;
    --sec: #FCEBEB; --sect: #A32D2D;
    --gen: #E6F1FB; --gent: #185FA5;
    --card: #FFFFFF;
    --text: #1a1a18;
    --muted: #6b6b68;
    --shadow: 0 2px 8px rgba(0,0,0,0.18), 0 8px 32px rgba(0,0,0,0.14);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-page);
    color: var(--text-page);
    min-height: 100vh;
    display: flex;
  }

  /* ── SIDEBAR ──────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-s);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 200;
    transition: transform 0.25s ease;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .sidebar::-webkit-scrollbar { width: 0; }

  .sidebar-brand {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border-s);
    flex-shrink: 0;
  }
  .brand-logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.06em;
    display: block;
    margin-bottom: 2px;
  }
  .brand-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .nav-section {
    padding: 14px 0 6px;
    flex-shrink: 0;
  }
  .nav-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 18px 6px;
    display: block;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: none;
    border: none;
    padding: 8px 18px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    text-align: left;
    transition: color 0.15s, background 0.15s;
    border-radius: 0;
    white-space: nowrap;
    position: relative;
  }
  .nav-btn:hover {
    color: var(--text-page);
    background: rgba(255,255,255,0.04);
  }
  .nav-btn.active {
    color: var(--accent);
    background: var(--accent-bg);
  }
  .nav-btn.active::before {
    content: '';
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 2px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .nav-icon {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 5px;
    flex-shrink: 0;
    width: 32px;
    text-align: center;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 18px;
    border-top: 1px solid var(--border-s);
    flex-shrink: 0;
  }
  .sidebar-footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .sidebar-footer-text a {
    color: var(--accent);
    text-decoration: none;
  }

  /* ── MOBILE TOGGLE ────────────────────────────── */
  .mobile-header {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border-s);
    z-index: 300;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
  }
  .hamburger {
    background: none;
    border: 1px solid var(--border-s);
    border-radius: 7px;
    width: 36px; height: 36px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .hamburger span {
    display: block;
    width: 16px; height: 1.5px;
    background: var(--text-page);
    border-radius: 2px;
    transition: all 0.2s;
  }
  .mobile-brand {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .mobile-card-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 190;
    backdrop-filter: blur(2px);
  }
  .overlay.visible { display: block; }

  /* ── MAIN CONTENT ─────────────────────────────── */
  .main-content {
    margin-left: var(--sidebar-w);
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }


  main {
    padding: 20px 28px 60px;
    max-width: 720px;
    width: 100%;
  }

  /* ── CARD (always white) ──────────────────────── */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(0,0,0,0.06);
    overflow: hidden;
    animation: fadeUp 0.22s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 22px 22px 18px;
    border-bottom: 1px solid var(--border-c);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .icon-badge {
    width: 46px; height: 46px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .topic-name {
    font-size: 21px;
    font-weight: 600;
    flex: 1;
    min-width: 120px;
    color: var(--text);
  }
  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .badge:hover { opacity: 0.75; }
  .badge.no-click { cursor: default; }
  .badge.no-click:hover { opacity: 1; }

  .card-body { padding: 20px 22px; }

  .oneliner {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
  }

  .hook-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hook-box {
    border-left: 3px solid #D3D1C7;
    padding: 10px 14px;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.6;
    background: #fafaf8;
  }

  .visual-wrap {
    margin-bottom: 18px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border-c);
  }

  .terms-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
  }
  .term-pill {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }
  .term-pill:hover { opacity: 0.8; transform: translateY(-1px); }
  .term-pill.static { cursor: default; }
  .term-pill.static:hover { opacity: 1; transform: none; }

  .trap-box {
    background: var(--sec);
    border: 1px solid rgba(163,45,45,0.15);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .trap-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--sect);
    letter-spacing: 0.04em;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .trap-text {
    font-size: 13px;
    color: var(--sect);
    line-height: 1.55;
  }

  .related-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border-c);
  }
  .related-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .related-cards {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .related-card {
    flex: 1;
    min-width: 120px;
    background: #f8f8f6;
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .related-card:hover {
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transform: translateY(-1px);
  }
  .rc-icon {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 5px;
    margin-bottom: 5px;
    display: inline-block;
  }
  .rc-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .rc-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

  svg text { font-family: 'DM Sans', sans-serif; }

  /* ── SIDEBAR SEARCH ──────────────────────────── */
  .sidebar-search { padding: 10px 14px; border-bottom: 1px solid var(--border-s); flex-shrink: 0; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 12px; pointer-events: none; }
  .search-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-s); border-radius: 7px; padding: 6px 10px 6px 26px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text-page); outline: none; transition: border .15s; }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); }
  .nav-btn.hidden { display: none; }


  /* ── EXTRA SECTIONS ──────────────────────────── */
  .extra-section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; margin: 18px 0 6px; }
  .extra-section-body { background: #fafaf8; border: 1px solid rgba(0,0,0,0.07); border-radius: 10px; padding: 14px 16px; margin-bottom: 4px; }


  /* ── TOPOLOGY PAGE ───────────────────────────── */
  .topo-page { padding: 24px 0 0; }
  .topo-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .topo-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .topo-card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 16px; animation: fadeUp .22s ease; }

  /* ── RESPONSIVE ───────────────────────────────── */
  @media (max-width: 768px) {
    .sidebar {
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .mobile-header {
      display: flex;
    }
    .main-content {
      margin-left: 0;
      padding-top: 52px;
    }
    main {
      padding: 12px 16px 60px;
    }

  }

  @media (max-width: 480px) {
    .card-header {
      padding: 16px 16px 14px;
    }
    .card-body {
      padding: 16px 16px;
    }
    .topic-name {
      font-size: 18px;
    }
  }
</style>
</head>
<body>

<!-- Mobile header -->
<div class="mobile-header" id="mobileHeader">
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
  <span class="mobile-brand">LNS · CCNA</span>
  <span class="mobile-card-name" id="mobileCardName"></span>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-logo">LNS</span>
    <span class="brand-sub">CCNA 200-301 · Visual Cards</span>
  </div>

  <div class="sidebar-search">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="sidebarSearch" type="text" placeholder="Search cards…" oninput="filterNav(this.value)">
    </div>
  </div>

  <nav class="nav-section">
    <span class="nav-section-label">Overview</span>
    <button class="nav-btn" onclick="showTopo()" data-id="__topo">
      <span class="nav-icon" style="background:#E1F5EE;color:#0F6E56">MAP</span>Network Map
    </button>
  </nav>

  <nav class="nav-section">
    <span class="nav-section-label">Devices</span>
    <button class="nav-btn" onclick="showCard('router')" data-id="router">
      <span class="nav-icon" style="background:#E6F1FB;color:#185FA5">RT</span>
      Router
    </button>
    <button class="nav-btn" onclick="showCard('switch')" data-id="switch">
      <span class="nav-icon" style="background:#FAECE7;color:#993C1D">SW</span>
      Switch
    </button>
    <button class="nav-btn" onclick="showCard('firewall')" data-id="firewall">
      <span class="nav-icon" style="background:#FCEBEB;color:#A32D2D">FW</span>
      Firewall
    </button>
    <button class="nav-btn" onclick="showCard('wap')" data-id="wap">
      <span class="nav-icon" style="background:#FAEEDA;color:#854F0B">WL</span>
      Wireless / WAP
    </button>
  </nav>

  <nav class="nav-section">
    <span class="nav-section-label">Concepts</span>
    <button class="nav-btn" onclick="showCard('osi')" data-id="osi">
      <span class="nav-icon" style="background:#EEEDFE;color:#534AB7">OS</span>
      OSI Model
    </button>
    <button class="nav-btn" onclick="showCard('ip')" data-id="ip">
      <span class="nav-icon" style="background:#E6F1FB;color:#185FA5">IP</span>
      IP Addressing
    </button>
    <button class="nav-btn" onclick="showCard('ports')" data-id="ports">
      <span class="nav-icon" style="background:#EEEDFE;color:#534AB7">PT</span>
      Well-Known Ports
    </button>
  </nav>

  <nav class="nav-section">
    <span class="nav-section-label">Week 1</span>
    <button class="nav-btn" onclick="showCard('s00l00')" data-id="s00l00">
      <span class="nav-icon" style="background:#E6F1FB;color:#185FA5">L0</span>
      Lesson 0
    </button>
    <button class="nav-btn" onclick="showCard('s00l01')" data-id="s00l01">
      <span class="nav-icon" style="background:#FAECE7;color:#993C1D">L1</span>
      Lesson 1
    </button>
    <button class="nav-btn" onclick="showCard('w1l3')" data-id="w1l3">
      <span class="nav-icon" style="background:#FAEEDA;color:#854F0B">L3</span>
      Lesson 3
    </button>
    <button class="nav-btn" onclick="showCard('w1l4')" data-id="w1l4">
      <span class="nav-icon" style="background:#EEEDFE;color:#534AB7">L4</span>
      Lesson 4
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-footer-text">
      <a href="https://lew-netsec.github.io" target="_blank">lew-netsec.github.io</a><br>
      CCNA 200-301 Study Cards
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main-content">
  <main id="main"></main>
</div>

<script>
const CARDS = {

  router: {
    icon: 'RT', iconBg: '#E6F1FB', iconColor: '#185FA5',
    name: 'Router',
    layerLabel: 'Layer 3 · Network', layerBg: '#FAEEDA', layerColor: '#854F0B',
    layerTarget: 'osi',
    objLabel: 'Obj 1.1.c', objBg: '#E1F5EE', objColor: '#0F6E56',
    oneliner: 'Connects separate networks together and decides the best path for data to travel between them.',
    hook: 'Like a postal sorting hub between cities — it doesn\'t care about the streets inside each city (that\'s the switch\'s job), it only knows how to get your parcel from one city to another.',
    visual: `
    <svg viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;background:#fafaf8;padding:10px 0;">
      <rect x="20" y="40" width="130" height="100" rx="8" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="1"/>
      <text x="85" y="60" text-anchor="middle" font-size="11" fill="#185FA5" font-weight="500">Network A</text>
      <rect x="35" y="70" width="44" height="28" rx="5" fill="#fff" stroke="#B5D4F4" stroke-width="1"/>
      <text x="57" y="88" text-anchor="middle" font-size="10" fill="#378ADD">PC</text>
      <rect x="90" y="70" width="44" height="28" rx="5" fill="#fff" stroke="#B5D4F4" stroke-width="1"/>
      <text x="112" y="88" text-anchor="middle" font-size="10" fill="#378ADD">PC</text>
      <rect x="60" y="108" width="44" height="22" rx="4" fill="#185FA5"/>
      <text x="82" y="122" text-anchor="middle" font-size="10" fill="#fff" font-weight="500">SW</text>
      <line x1="57" y1="98" x2="75" y2="108" stroke="#B5D4F4" stroke-width="1.5"/>
      <line x1="112" y1="98" x2="90" y2="108" stroke="#B5D4F4" stroke-width="1.5"/>
      <rect x="210" y="65" width="140" height="50" rx="10" fill="#FAEEDA" stroke="#FAC775" stroke-width="1.5"/>
      <text x="280" y="86" text-anchor="middle" font-size="13" fill="#854F0B" font-weight="600">ROUTER</text>
      <text x="280" y="103" text-anchor="middle" font-size="10" fill="#BA7517">routes between networks</text>
      <rect x="410" y="40" width="130" height="100" rx="8" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="1"/>
      <text x="475" y="60" text-anchor="middle" font-size="11" fill="#0F6E56" font-weight="500">Network B</text>
      <rect x="425" y="70" width="44" height="28" rx="5" fill="#fff" stroke="#9FE1CB" stroke-width="1"/>
      <text x="447" y="88" text-anchor="middle" font-size="10" fill="#1D9E75">PC</text>
      <rect x="480" y="70" width="44" height="28" rx="5" fill="#fff" stroke="#9FE1CB" stroke-width="1"/>
      <text x="502" y="88" text-anchor="middle" font-size="10" fill="#1D9E75">PC</text>
      <rect x="450" y="108" width="44" height="22" rx="4" fill="#0F6E56"/>
      <text x="472" y="122" text-anchor="middle" font-size="10" fill="#fff" font-weight="500">SW</text>
      <line x1="447" y1="98" x2="465" y2="108" stroke="#9FE1CB" stroke-width="1.5"/>
      <line x1="502" y1="98" x2="486" y2="108" stroke="#9FE1CB" stroke-width="1.5"/>
      <line x1="150" y1="119" x2="210" y2="90" stroke="#D3D1C7" stroke-width="1.5" stroke-dasharray="5,3"/>
      <line x1="410" y1="90" x2="454" y2="119" stroke="#D3D1C7" stroke-width="1.5" stroke-dasharray="5,3"/>
      <path d="M155 90 L205 90" stroke="#EF9F27" stroke-width="2" fill="none" marker-end="url(#arr)"/>
      <path d="M350 90 L405 90" stroke="#EF9F27" stroke-width="2" fill="none" marker-end="url(#arr)"/>
      <text x="177" y="84" text-anchor="middle" font-size="9" fill="#BA7517">packet</text>
      <text x="376" y="84" text-anchor="middle" font-size="9" fill="#BA7517">packet</text>
      <defs><marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0, 7 3.5, 0 7" fill="#EF9F27"/></marker></defs>
    </svg>`,
    terms: [
      { label: 'Layer 3', bg: '#FAEEDA', color: '#854F0B', target: 'osi' },
      { label: 'IP address', bg: '#E6F1FB', color: '#185FA5', target: 'ip' },
      { label: 'routing table', bg: '#FAEEDA', color: '#854F0B' },
      { label: 'default gateway', bg: '#E1F5EE', color: '#0F6E56' },
      { label: 'packet', bg: '#EEEDFE', color: '#534AB7' },
      { label: 'WAN', bg: '#F1EFE8', color: '#5F5E5A' },
      { label: 'next-hop', bg: '#FAEEDA', color: '#854F0B' },
    ],
    trap: 'Routers do NOT connect devices within the same network — that is the switch\'s job. A router only cares about IP addresses (Layer 3), not MAC addresses. Also: your default gateway IS your router\'s IP — students often think they\'re different things.',

        label: 'The packet journey — step by step',
        content: `<ol style="padding-left:18px;margin:0;line-height:2;">
          <li style="font-size:13px;color:#1a1a18;margin-bottom:6px;"><strong>DNS first.</strong> Johnny types "NetworkChuck Coffee." His device asks the DNS server for the IP — gets back <code style="background:#f1efe8;padding:1px 5px;border-radius:4px;font-size:12px;">23.1.1.50</code>. Only now can routing begin. Routers route numbers, not names.</li>
          <li style="font-size:13px;color:#1a1a18;margin-bottom:6px;"><strong>Local or remote?</strong> Johnny's device compares the destination IP against its own subnet mask. Is <code style="background:#f1efe8;padding:1px 5px;border-radius:4px;font-size:12px;">23.1.1.50</code> on <code style="background:#f1efe8;padding:1px 5px;border-radius:4px;font-size:12px;">10.1.1.x</code>? No — it's remote. Decision made: send to the default gateway.</li>
          <li style="font-size:13px;color:#1a1a18;margin-bottom:6px;"><strong>ARP for the router.</strong> Johnny knows the gateway IP (<code style="background:#f1efe8;padding:1px 5px;border-radius:4px;font-size:12px;">10.1.1.1</code>). He ARPs for its MAC address — same local process, different target.</li>
          <li style="font-size:13px;color:#1a1a18;margin-bottom:6px;"><strong>Frame hop 1.</strong> Layer 2 frame: src=Johnny_MAC → dst=Router_MAC. Layer 3 packet inside: src=10.1.1.10 → dst=23.1.1.50. Switch delivers it locally.</li>
          <li style="font-size:13px;color:#1a1a18;margin-bottom:6px;"><strong>Router strips the frame.</strong> Discards the Layer 2 wrapper. Reads the Layer 3 destination IP. Consults routing table — <code style="background:#f1efe8;padding:1px 5px;border-radius:4px;font-size:12px;">23.1.1.x</code> exits via eth1.</li>
          <li style="font-size:13px;color:#1a1a18;margin-bottom:6px;"><strong>ARP on the far side.</strong> Router ARPs on Network B to learn the server's MAC — same process, new segment.</li>
          <li style="font-size:13px;color:#1a1a18;"><strong>Frame hop 2.</strong> Router builds a brand-new frame: src=Router_MAC → dst=Server_MAC. Same Layer 3 packet inside — destination IP <em>never changed</em>. Switch B delivers it to the coffee server.</li>
        </ol>`

            <div style="font-size:12px;color:#534AB7;line-height:1.7">The <strong>troubleshooting language.</strong> Engineers say "Layer 1 issue" or "Layer 7 problem" all day long — even when the actual traffic uses TCP/IP. OSI gives a clean, shared vocabulary. It never became the practical standard but it won the terminology war.</div>

            <div style="font-size:12px;color:#185FA5;line-height:1.7">The <strong>model devices actually use.</strong> Every OS, router, phone, and server on Earth runs TCP/IP. It won because it was practical, open, and already deployed on ARPANET. It collapsed OSI's top three layers into one Application layer.</div>

        content: `<div style="font-size:13px;color:#1a1a18;line-height:1.75">
          <p style="margin-bottom:10px">Early networking was a proprietary mess. IBM had its own system. Other vendors had others. Their devices couldn't talk to each other — like trying to plug the wrong charger into your phone. Cool tech, useless at scale.</p>
          <p style="margin-bottom:10px">ARPANET (1960s, U.S. Dept of Defense) proved computers could communicate across a network using <strong>packet switching</strong> — breaking data into chunks, sending them independently, reassembling at the destination. Revolutionary concept, but no agreed standard yet.</p>
          <p>Eventually everyone realised: without shared rules, networking would stay a collection of incompatible islands. That realisation produced the models. TCP/IP became the open standard. OSI became the reference framework. Together they made universal networking possible.</p>

function showCard(id) {
  if (!CARDS[id]) return;
  current = id;
  renderCard(id);
  updateNav(id);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  closeSidebar();
  document.getElementById('mobileCardName').textContent = CARDS[id].name;
}

function renderCard(id) {
  const c = CARDS[id];
  const main = document.getElementById('main');

  if (c.customRender) { main.innerHTML = renderPortsCard(c); return; }


  const extraHtml = (c.extraSections || []).map(s => {
    return `<div class="extra-section-label">${s.label}</div><div class="extra-section-body">${s.content}</div>`;
  }).join('');

  main.innerHTML = `<div class="card">
    <div class="card-header">
      <div class="icon-badge" style="background:${c.iconBg};color:${c.iconColor}">${c.icon}</div>
      <span class="topic-name">${c.name}</span>
      ${c.layerTarget
        ? `<span class="badge" style="background:${c.layerBg};color:${c.layerColor}" onclick="showCard('${c.layerTarget}')">${c.layerLabel} ↗</span>`
        : `<span class="badge no-click" style="background:${c.layerBg};color:${c.layerColor}">${c.layerLabel}</span>`}
      <span class="badge no-click" style="background:${c.objBg};color:${c.objColor}">${c.objLabel}</span>
    </div>
    <div class="card-body">
      <p class="oneliner">${c.oneliner}</p>
      <div class="hook-label">Memory hook</div>
      <div class="hook-box">${c.hook}</div>
      ${c.visual ? `<div class="visual-wrap">${c.visual}</div>` : ''}
      ${extraHtml}
      <div class="hook-label">Key terms</div>
      <div class="terms-wrap">
        ${c.terms.map(t => t.target
          ? `<button class="term-pill" style="background:${t.bg};color:${t.color}" onclick="showCard('${t.target}')">${t.label} ↗</button>`
          : `<span class="term-pill static" style="background:${t.bg};color:${t.color}">${t.label}</span>`
        ).join('')}
      </div>
      <div class="trap-box">
        <div class="trap-label">⚠ Exam trap</div>
        <div class="trap-text">${c.trap}</div>
      </div>
      <div class="related-section">
        <div class="related-label">Related cards</div>
        <div class="related-cards">
          ${c.related.map(r => `<div class="related-card" onclick="showCard('${r.id}')">
            <span class="rc-icon" style="background:${r.iconBg};color:${r.iconColor}">${r.icon}</span>

}

function renderPortsCard(c) {

  const tcpudpHtml = c.tcpudp ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
      ${c.tcpudp.map(t => `
        <div style="background:${t.bg};border-radius:8px;padding:10px 12px;">
          <div style="font-size:13px;font-weight:500;color:${t.color};margin-bottom:4px;">${t.proto}</div>
          <div style="font-size:11px;color:${t.color};margin-bottom:5px;line-height:1.4;">${t.desc}</div>
          <div style="font-size:10px;color:${t.color};opacity:0.8;font-style:italic;">${t.services}</div>
        </div>`).join('')}
    </div>` : '';

  const groupsHtml = c.groups.map(g => `
    <div style="margin-bottom:10px;">
      <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:#6b6b68;padding:10px 0 5px;">${g.label}</div>
      ${g.rows.map(r => `
        <div style="display:grid;grid-template-columns:56px 72px 1fr;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;transition:background 0.1s;" onmouseover="this.style.background='#f5f4f0'" onmouseout="this.style.background='transparent'">
          <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:500;">${r.port}</span>
          <span style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:${r.protoBg};color:${r.protoColor};display:inline-block;text-align:center;">${r.proto}</span>
          <span>
            <span style="font-size:13px;font-weight:500;">${r.name}</span>
            <span style="font-size:11px;color:#6b6b68;margin-left:6px;">${r.note}</span>
          </span>
        </div>`).join('')}
    </div>`).join('');

  const trapsHtml = c.traps.map(t => `<p style="font-size:12px;color:#A32D2D;margin:0 0 5px;line-height:1.5;">${t}</p>`).join('');
  const relatedHtml = c.related.map(r => `
    <div class="related-card" onclick="showCard('${r.id}')">
      <span class="rc-icon" style="background:${r.iconBg};color:${r.iconColor}">${r.icon}</span>
      <div class="rc-name">${r.name}</div>
      <div class="rc-desc">${r.desc}</div>
    </div>`).join('');

  return `<div class="card">
    <div class="card-header">
      <div class="icon-badge" style="background:${c.iconBg};color:${c.iconColor}">${c.icon}</div>
      <span class="topic-name">${c.name}</span>
      <span class="badge" style="background:${c.layerBg};color:${c.layerColor}" onclick="showCard('${c.layerTarget}')">${c.layerLabel} ↗</span>
      <span class="badge no-click" style="background:${c.objBg};color:${c.objColor}">${c.objLabel}</span>
    </div>
    <div class="card-body">
      <p class="oneliner">Virtual doors on a device — every service listens on a numbered port so the OS knows which application gets each incoming packet.</p>
      <div class="hook-box">IP address = the building. Port number = the flat inside. You need both to reach the right application on the right device.</div>
      <div class="hook-label">TCP vs UDP — Obj 1.5</div>
      ${tcpudpHtml}
      <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:#6b6b68;margin-bottom:2px;">
        <span style="display:inline-block;width:56px;">Port</span>
        <span style="display:inline-block;width:72px;">Protocol</span>
        <span>Service · Exam note</span>
      </div>
      <div style="border-top:1px solid rgba(0,0,0,0.08);margin-bottom:4px;"></div>
      ${groupsHtml}
      <div class="trap-box" style="margin-top:8px;">
        <div class="trap-label">⚠ Exam traps</div>
        ${trapsHtml}
      </div>
      <div class="related-section">
        <div class="related-label">Related cards</div>
        <div class="related-cards">${relatedHtml}</div>
      </div>
    </div>
  </div>`;
}

function updateNav(id) {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.id === id) btn.classList.add('active');
  });
}

function filterNav(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.nav-btn[data-id]').forEach(btn => {
    const id = btn.dataset.id;
    if (id === '__topo') { btn.classList.toggle('hidden', q && !'network map'.includes(q)); return; }
    const card = CARDS[id];
    const text = btn.textContent.toLowerCase();
    const terms = card ? (card.terms||[]).map(t=>t.label.toLowerCase()).join(' ') : '';
    const name = card ? card.name.toLowerCase() : '';
    btn.classList.toggle('hidden', !!(q && !text.includes(q) && !terms.includes(q) && !name.includes(q)));
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}
