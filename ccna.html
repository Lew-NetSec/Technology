<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA 200-301</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --l1: #F1EFE8; --l1t: #5F5E5A;
    --l2: #FAECE7; --l2t: #993C1D;
    --l3: #FAEEDA; --l3t: #854F0B;
    --l4: #E1F5EE; --l4t: #0F6E56;
    --l57: #EEEDFE; --l57t: #534AB7;
    --sec: #FCEBEB; --sect: #A32D2D;
    --gen: #E6F1FB; --gent: #185FA5;
    --bg: #F2F1ED;
    --card: #FFFFFF;
    --text: #1a1a18;
    --muted: #6b6b68;
    --border: rgba(0,0,0,0.09);
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 16px;
    --sidebar-w: 220px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ═══════════════════════════════
     MOBILE LAYOUT (default)
  ═══════════════════════════════ */

  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* top nav — mobile: scrollable card buttons */
  .top-nav {
    height: 52px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 7px;
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .top-nav::-webkit-scrollbar { display: none; }

  .nav-brand {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    margin-right: 4px;
    flex-shrink: 0;
  }

  .nav-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
    position: relative;
  }
  .nav-btn.active { background: var(--gen); color: var(--gent); border-color: transparent; }
  .nav-btn .fail-dot {
    position: absolute; top: -2px; right: -2px;
    width: 8px; height: 8px; border-radius: 50%;
    background: #E24B4A; border: 1.5px solid var(--bg); display: none;
  }
  .nav-btn.has-fails .fail-dot { display: block; }

  /* main area — takes remaining height, flex column */
  .main-area {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* scroll area — fills space between header and toggle bar */
  .scroll-area {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  /* bottom toggle bar — in normal flow on mobile, not fixed */
  .toggle-bar {
    flex-shrink: 0;
    height: 62px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 9px 12px;
    gap: 8px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  }

  .toggle-btn {
    flex: 1;
    max-width: 150px;
    height: 44px;
    border-radius: 22px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .toggle-btn.notes-btn { background: var(--gen); color: var(--gent); }
  .toggle-btn.notes-btn.active { background: var(--gent); color: #fff; box-shadow: 0 4px 14px rgba(24,95,165,0.3); }
  .toggle-btn.quiz-btn { background: var(--l4); color: var(--l4t); }
  .toggle-btn.quiz-btn.active { background: var(--l4t); color: #fff; box-shadow: 0 4px 14px rgba(15,110,86,0.3); }
  .toggle-btn.results-btn { background: var(--l57); color: var(--l57t); }
  .toggle-btn.results-btn.active { background: var(--l57t); color: #fff; box-shadow: 0 4px 14px rgba(83,74,183,0.3); }
  .toggle-btn.quiz-btn .q-badge {
    background: rgba(255,255,255,0.25);
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 10px;
    min-width: 20px; text-align: center;
  }

  /* page content — mobile */
  .page { display: none; padding: 14px 14px 0; }
  .page.visible { display: block; }

  /* ═══════════════════════════════
     DESKTOP LAYOUT (≥ 768px)
  ═══════════════════════════════ */
  @media (min-width: 768px) {
    body { overflow: hidden; }

    .app-shell {
      flex-direction: row;
      height: 100vh;
    }

    /* hide mobile top nav on desktop */
    .top-nav { display: none; }

    /* sidebar replaces top nav + bottom bar */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-brand {
      padding: 20px 18px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* view tabs in sidebar */
    .sidebar-tabs {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-tab {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border-radius: 10px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      background: none;
      color: var(--muted);
      text-align: left;
      width: 100%;
    }
    .sidebar-tab:hover { background: var(--bg); color: var(--text); }
    .sidebar-tab.notes-tab.active { background: var(--gen); color: var(--gent); }
    .sidebar-tab.quiz-tab.active { background: var(--l4); color: var(--l4t); }
    .sidebar-tab.results-tab.active { background: var(--l57); color: var(--l57t); }
    .sidebar-tab .tab-badge {
      margin-left: auto;
      background: var(--sec);
      color: var(--sect);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 10px;
    }

    /* card list in sidebar */
    .sidebar-cards {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .sidebar-cards-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 4px 8px 8px;
      opacity: 0.7;
    }
    .sidebar-card-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 8px 10px;
      border-radius: 9px;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      text-align: left;
      transition: all 0.12s;
      position: relative;
    }
    .sidebar-card-btn:hover { background: var(--bg); color: var(--text); }
    .sidebar-card-btn.active { background: var(--bg); color: var(--text); font-weight: 700; }
    .sidebar-card-btn .s-icon {
      width: 26px; height: 26px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 9px; font-weight: 600;
      flex-shrink: 0;
    }
    .sidebar-card-btn .s-fail-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #E24B4A;
      border: 1.5px solid var(--card);
      position: absolute;
      top: 6px; left: 28px;
      display: none;
    }
    .sidebar-card-btn.has-fails .s-fail-dot { display: block; }

    /* hide mobile toggle bar on desktop */
    .toggle-bar { display: none; }

    /* main content area */
    .main-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* desktop content header */
    .desktop-header {
      display: flex;
      align-items: center;
      padding: 0 28px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      flex-shrink: 0;
      gap: 10px;
    }
    .desktop-header-title {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
    }
    .desktop-header-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .scroll-area {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 32px;
    }

    .page { padding: 24px 28px 0; max-width: 720px; }

    /* wider notes card on desktop */
    .notes-section { padding: 18px 22px; }
    .notes-title-row { padding: 18px 22px 16px; }
    .q-text { font-size: 18px; }
    .option-btn { font-size: 14px; padding: 15px 18px; }
    .oneliner { font-size: 16px; }
    .hook-box { font-size: 14px; }
  }

  /* ═══════════════════════════════
     SHARED COMPONENT STYLES
  ═══════════════════════════════ */

  .notes-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .notes-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .icon-badge {
    width: 36px; height: 36px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }
  .notes-title { font-size: 17px; font-weight: 700; flex: 1; min-width: 0; }
  .badge {
    font-size: 10px; font-weight: 600;
    padding: 3px 9px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }
  .notes-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .notes-section:last-child { border-bottom: none; }
  .block-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .oneliner { font-size: 15px; font-weight: 500; line-height: 1.6; color: var(--text); }
  .hook-box {
    border-left: 3px solid #D3D1C7;
    padding: 10px 14px; font-size: 13px;
    color: var(--muted); font-style: italic;
    line-height: 1.6; border-radius: 0;
  }
  .visual-wrap { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .terms-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .term-pill {
    font-size: 12px; font-weight: 600;
    padding: 5px 12px; border-radius: 20px;
    border: none; font-family: 'DM Sans', sans-serif; cursor: pointer;
  }
  .term-pill.static { cursor: default; }
  .trap-box { background: var(--sec); border-radius: 10px; padding: 12px 14px; }
  .trap-label { font-size: 11px; font-weight: 700; color: var(--sect); margin-bottom: 5px; }
  .trap-text { font-size: 13px; color: var(--sect); line-height: 1.55; }

  .stat-pill { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .stat-correct { background: var(--l4); color: var(--l4t); }
  .stat-wrong { background: var(--sec); color: var(--sect); }

  .quiz-progress { height: 3px; background: rgba(0,0,0,0.07); border-radius: 2px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: var(--l4t); border-radius: 2px; transition: width 0.4s ease; }

  .question-card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 20px 18px 18px; box-shadow: var(--shadow);
  }
  .question-card.was-wrong { border-color: rgba(163,45,45,0.25); }
  .q-wrong-flag {
    display: inline-block; background: var(--sec); color: var(--sect);
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; margin-bottom: 10px;
  }
  .q-text { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 18px; color: var(--text); }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--bg); border: 1.5px solid rgba(0,0,0,0.1);
    border-radius: 12px; padding: 14px 16px;
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    font-weight: 500; color: var(--text); text-align: left;
    cursor: pointer; transition: background 0.12s, border-color 0.12s, opacity 0.2s; line-height: 1.4;
  }
  .option-btn:hover { background: #eae9e4; }
  .option-btn:active { transform: scale(0.985); }
  .option-btn.selected-correct { background: var(--l4); border-color: var(--l4t); color: var(--l4t); font-weight: 700; }
  .option-btn.selected-wrong { background: var(--sec); border-color: var(--sect); color: var(--sect); font-weight: 700; }
  .option-btn.reveal-correct { background: var(--l4); border-color: var(--l4t); color: var(--l4t); font-weight: 600; }
  .option-btn.dim-out { opacity: 0.35; }
  .option-btn.disabled { cursor: default; pointer-events: none; }
  .explanation {
    margin-top: 14px; padding: 12px 14px; background: #1a1a18;
    border-radius: 10px; font-size: 13px; color: rgba(255,255,255,0.82);
    line-height: 1.55; display: none;
  }
  .explanation.show { display: block; }

  .quiz-complete {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 32px 24px;
    text-align: center; box-shadow: var(--shadow); margin-bottom: 12px;
  }
  .complete-emoji { font-size: 40px; margin-bottom: 12px; }
  .complete-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .complete-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
  .score-ring {
    width: 88px; height: 88px; margin: 0 auto 18px;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .score-ring svg { position: absolute; top: 0; left: 0; }
  .score-num { font-size: 22px; font-weight: 700; position: relative; z-index: 1; }
  .score-label { font-size: 10px; color: var(--muted); font-weight: 600; text-align: center; }
  .retry-btn {
    background: var(--l4t); color: #fff; border: none;
    border-radius: 22px; padding: 13px 28px;
    font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif;
    cursor: pointer; margin: 0 auto; display: block; transition: all 0.15s;
  }
  .retry-btn:hover { opacity: 0.88; }
  .retry-note { font-size: 11px; color: var(--muted); margin-top: 10px; text-align: center; line-height: 1.5; }

  .next-btn {
    width: 100%; margin-top: 14px; height: 48px;
    background: var(--text); color: #fff; border: none;
    border-radius: 24px; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; position: relative; overflow: hidden;
  }
  .next-btn:hover { opacity: 0.88; }
  .next-btn-timer {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: rgba(255,255,255,0.12); border-radius: 24px;
    animation: timerShrink 5s linear forwards;
  }
  @keyframes timerShrink { from { width: 100%; } to { width: 0%; } }

  .result-card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 16px;
    margin-bottom: 10px; box-shadow: var(--shadow);
  }
  .result-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .result-name { font-size: 15px; font-weight: 700; flex: 1; }
  .result-counts { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .result-count-pill { font-size: 12px; font-weight: 600; padding: 4px 11px; border-radius: 20px; }
  .result-bar-wrap { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .result-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .result-review-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--sec); color: var(--sect); border: none;
    border-radius: 10px; padding: 8px 13px; font-size: 12px;
    font-weight: 700; font-family: 'DM Sans', sans-serif;
    cursor: pointer; width: 100%; transition: all 0.15s;
  }
  .result-review-btn:hover { opacity: 0.85; }

  .port-group-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--muted); padding: 10px 0 5px;
  }
  .port-row { display: grid; grid-template-columns: 48px 64px 1fr; align-items: center; gap: 8px; padding: 7px 4px; }
  .port-num { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .proto-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; display: inline-block; text-align: center; }
  .port-info .port-name { font-size: 13px; font-weight: 600; }
  .port-info .port-note { font-size: 10px; color: var(--muted); margin-top: 1px; line-height: 1.3; }

  svg text { font-family: 'DM Sans', sans-serif; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .page.visible { animation: fadeUp 0.18s ease; }
  @keyframes pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  .option-btn.selected-correct { animation: pop 0.22s ease; }
</style>
</head>
<body>

<div class="app-shell">

  <!-- MOBILE: top scrollable nav (hidden on desktop) -->
  <nav class="top-nav" id="nav">
    <span class="nav-brand">CCNA 200-301</span>
  </nav>

  <!-- DESKTOP: sidebar (hidden on mobile via CSS) -->
  <aside class="sidebar" id="sidebar" style="display:none">
    <div class="sidebar-brand">CCNA 200-301</div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab notes-tab active" id="sideNotesBtn" onclick="setView('notes')">📖 Notes</button>
      <button class="sidebar-tab quiz-tab" id="sideQuizBtn" onclick="setView('quiz')">🧠 Quiz <span class="tab-badge" id="sideFailBadge" style="display:none"></span></button>
      <button class="sidebar-tab results-tab" id="sideResultsBtn" onclick="setView('results')">📊 Results</button>
    </div>
    <div class="sidebar-cards" id="sidebarCards"></div>
  </aside>

  <!-- MAIN: header + scroll area + mobile bottom bar -->
  <div class="main-area">
    <div class="desktop-header" id="desktopHeader" style="display:none">
      <span class="desktop-header-title" id="desktopTitle">Notes</span>
      <span id="desktopBadge"></span>
    </div>

    <div class="scroll-area" id="scrollArea">
      <div id="pageContent"></div>
    </div>

    <!-- MOBILE: bottom toggle bar — inside main-area so it participates in flex flow -->
    <div class="toggle-bar" id="toggleBar">
      <button class="toggle-btn notes-btn active" id="notesBtn" onclick="setView('notes')">📖 Notes</button>
      <button class="toggle-btn quiz-btn" id="quizBtn" onclick="setView('quiz')">🧠 Quiz <span class="q-badge" id="failBadge"></span></button>
      <button class="toggle-btn results-btn" id="resultsBtn" onclick="setView('results')">📊 Results</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// QUIZ DATA
// ─────────────────────────────────────────────
const QUIZZES = {
  router: [
    { q: "What OSI layer does a router operate at?", opts: ["Layer 1 – Physical","Layer 2 – Data Link","Layer 3 – Network","Layer 4 – Transport"], ans: 2, exp: "Routers are Layer 3 devices — they make forwarding decisions based on IP addresses." },
    { q: "What does a router use to make forwarding decisions?", opts: ["MAC addresses","IP addresses","Port numbers","SSID names"], ans: 1, exp: "Routers use IP addresses (Layer 3) to determine the best path. MAC addresses are used by switches at Layer 2." },
    { q: "What is the 'default gateway' on a host?", opts: ["The switch's MAC address","The firewall's serial number","The router's IP address on that subnet","The DNS server IP"], ans: 2, exp: "The default gateway IS the router's IP on your local subnet. Packets destined for outside the LAN are sent here." },
    { q: "A router connects devices WITHIN the same network. True or False?", opts: ["True","False"], ans: 1, exp: "FALSE — connecting devices within a LAN is the switch's job. Routers connect BETWEEN separate networks." },
    { q: "What is stored in a router's routing table?", opts: ["MAC-to-port mappings","SSID configurations","Known network paths and next-hop addresses","VLAN assignments"], ans: 2, exp: "The routing table contains learned network prefixes, next-hop IP addresses, and metrics for choosing the best path." },
    { q: "At home, a typical 'router box' actually combines which four functions?", opts: ["Router + Switch + WAP + Modem","Router + Firewall + Server + Printer","Switch + Hub + Modem + WAP","Router + DNS + DHCP + Proxy"], ans: 0, exp: "Consumer devices are combo units: modem (WAN link), router (L3 routing), switch (L2 LAN ports), and WAP (wireless). In enterprise each is a dedicated device." },
    { q: "What PDU (Protocol Data Unit) name does a router deal with?", opts: ["Bit","Frame","Packet","Segment"], ans: 2, exp: "Layer 3 = packets. Layer 2 = frames. Layer 4 = segments. Layer 1 = bits." },

// ─────────────────────────────────────────────
// STATE & STORAGE
// ─────────────────────────────────────────────
const STORAGE_KEY = 'ccna_quiz_v1';
let current = 'router';
let view = 'notes';
let quizState = {};
let navHistory = [];

const CARD_ORDER = ['router','switch','osi','ip','firewall','wap','ports','s00l00','s00l01'];
const CARD_LABELS = { router:'Router', switch:'Switch', osi:'OSI Model', ip:'IP Addressing', firewall:'Firewall', wap:'Wireless', ports:'Ports', s00l00:'S00·L00', s00l01:'S00·L01' };
const CARD_SHORT  = { router:'Router', switch:'Switch', osi:'OSI', ip:'IP Addr', firewall:'Firewall', wap:'Wireless', ports:'Ports', s00l00:'S00·L00', s00l01:'S00·L01' };

function isDesktop() { return window.innerWidth >= 768; }

window.addEventListener('resize', () => { applyLayout(); buildNav(); updateDesktopHeader(); });

function applyLayout() {
  const desk = isDesktop();
  document.getElementById('sidebar').style.display = desk ? 'flex' : 'none';
  document.getElementById('desktopHeader').style.display = desk ? 'flex' : 'none';
}

function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      for (const k in parsed) {
        quizState[k] = {
          attempts: parsed[k].attempts || [],
          failedIdxs: new Set(parsed[k].failedIdxs || [])
        };
      }
    }
  } catch(e) {}
}

function saveStorage() {
  try {
    const toSave = {};
    for (const k in quizState) {
      toSave[k] = {
        attempts: quizState[k].attempts,
        failedIdxs: [...quizState[k].failedIdxs]
      };
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch(e) {}
}

function getCardQuizState(id) {
  if (!quizState[id]) {
    quizState[id] = { attempts: [], failedIdxs: new Set() };
  }
  return quizState[id];
}

function getFailCount(id) {
  return getCardQuizState(id).failedIdxs.size;
}

// ─────────────────────────────────────────────
// NAV — adapts to mobile (top bar) or desktop (sidebar)
// ─────────────────────────────────────────────
function buildNav() {
  if (isDesktop()) {
    buildSidebar();
  } else {
    buildMobileNav();
  }
}

function buildMobileNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '<span class="nav-brand">CCNA 200-301</span>';
  if (view === 'quiz' || view === 'results') return;
  CARD_ORDER.forEach(id => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (id === current ? ' active' : '');
    if (getFailCount(id) > 0) btn.classList.add('has-fails');
    const dot = document.createElement('span');
    dot.className = 'fail-dot';
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(CARD_SHORT[id] || id));
    btn.onclick = () => showCard(id);
    nav.appendChild(btn);
  });
}

function buildSidebar() {
  const sideCards = document.getElementById('sidebarCards');
  // only show card list on notes view
  if (view === 'quiz' || view === 'results') {
    sideCards.innerHTML = '';
    return;
  }
  sideCards.innerHTML = `<div class="sidebar-cards-label">Cards</div>`;
  CARD_ORDER.forEach(id => {
    const c = CARDS[id];
    const btn = document.createElement('button');
    btn.className = 'sidebar-card-btn' + (id === current ? ' active' : '');
    if (getFailCount(id) > 0) btn.classList.add('has-fails');
    btn.innerHTML = `
      <div class="s-icon" style="background:${c.iconBg};color:${c.iconColor}">${c.icon}</div>
      <span class="s-fail-dot"></span>
      ${CARD_LABELS[id]}`;
    btn.onclick = () => showCard(id);
    sideCards.appendChild(btn);
  });
}

function updateDesktopHeader() {
  const title = document.getElementById('desktopTitle');
  const badge = document.getElementById('desktopBadge');
  if (!title) return;
  if (view === 'results') {
    title.textContent = 'Results';
    badge.innerHTML = '';
  } else if (view === 'quiz') {
    const c = CARDS[current];
    title.textContent = c.name + ' — Quiz';
    badge.innerHTML = `<span class="badge" style="background:${c.objBg};color:${c.objColor}">${c.objLabel}</span>`;
  } else {
    const c = CARDS[current];
    title.textContent = c.name;
    badge.innerHTML = c.layerTarget
      ? `<span class="badge" style="background:${c.layerBg};color:${c.layerColor};cursor:pointer" onclick="showCard('${c.layerTarget}')">${c.layerLabel} ↗</span>`
      : `<span class="badge" style="background:${c.layerBg};color:${c.layerColor}">${c.layerLabel}</span>`;
  }
}

function updateSidebarTabs() {
  ['notes','quiz','results'].forEach(v => {
    const btn = document.getElementById('side' + v.charAt(0).toUpperCase() + v.slice(1) + 'Btn');
    if (btn) btn.classList.toggle('active', view === v);
  });
}

// ─────────────────────────────────────────────
// CARD RENDER
// ─────────────────────────────────────────────
function showCard(id, push = true) {
  if (!CARDS[id]) return;
  if (push && current !== id) navHistory.push(current);
  current = id;
  buildNav();
  updateDesktopHeader();
  renderCurrentView();
  document.getElementById('scrollArea').scrollTo({ top: 0, behavior: 'smooth' });
}

function setView(v) {
  clearTimeout(window._autoAdvance);
  view = v;
  // mobile toggle bar
  document.getElementById('notesBtn').classList.toggle('active', v === 'notes');
  document.getElementById('quizBtn').classList.toggle('active', v === 'quiz');
  document.getElementById('resultsBtn').classList.toggle('active', v === 'results');
  // desktop sidebar tabs
  updateSidebarTabs();
  buildNav();
  updateDesktopHeader();
  renderCurrentView();
  document.getElementById('scrollArea').scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCurrentView() {
  updateFailBadge();
  if (view === 'notes') renderNotes(current);
  else if (view === 'quiz') renderQuiz(current);
  else renderResults();
}

function updateFailBadge() {
  const fails = getFailCount(current);
  // mobile badge
  const badge = document.getElementById('failBadge');
  if (badge) {
    badge.textContent = fails > 0 ? fails + ' ⚑' : '';
    badge.style.display = fails > 0 ? 'inline-block' : 'none';
  }
  // desktop sidebar badge
  const sideBadge = document.getElementById('sideFailBadge');
  if (sideBadge) {
    sideBadge.textContent = fails > 0 ? fails + ' ⚑' : '';
    sideBadge.style.display = fails > 0 ? 'inline-block' : 'none';
  }
}

// ─────────────────────────────────────────────
// QUIZ RENDER — one question at a time
// ─────────────────────────────────────────────
let quizSession = {};
// session shape: { answered: {qIdx: bool}, answeredChoice: {qIdx: int},
//                  queue: [qIdx,...], cursor: int, complete: bool }

function getSession(id) {
  if (!quizSession[id]) quizSession[id] = { answered: {}, answeredChoice: {}, queue: null, cursor: 0, complete: false };
  return quizSession[id];
}

function buildQueue(id) {
  const questions = QUIZZES[id];
  const qs = getCardQuizState(id);
  const failedIdxs = [...qs.failedIdxs];
  const remainingIdxs = questions.map((_,i) => i).filter(i => !qs.failedIdxs.has(i));
  return [...failedIdxs, ...remainingIdxs];
}

function renderQuiz(id) {
  const questions = QUIZZES[id];
  if (!questions) {
    document.getElementById('pageContent').innerHTML = `<div class="page visible" style="padding-top:40px;text-align:center;color:var(--muted);font-size:14px">Quiz coming soon.</div>`;
    return;
  }

  const session = getSession(id);
  if (!session.queue) session.queue = buildQueue(id);
  const queue = session.queue;
  const totalQ = queue.length;
  const cursor = session.cursor;
  const answeredCount = Object.keys(session.answered).length;
  const correctCount = Object.values(session.answered).filter(Boolean).length;
  const progressPct = totalQ ? (answeredCount / totalQ) * 100 : 0;
  const qs = getCardQuizState(id);
  const c = CARDS[id];

  let html = `<div class="page visible">`;

  if (session.complete) {
    const score = totalQ ? Math.round((correctCount / totalQ) * 100) : 0;
    const emoji = score === 100 ? '🏆' : score >= 80 ? '🎯' : score >= 60 ? '💪' : '📚';
    const failsLeft = getFailCount(id);
    const circumference = 2 * Math.PI * 36;
    const dashOffset = circumference - (score / 100) * circumference;
    const ringColor = score === 100 ? '#0F6E56' : score >= 80 ? '#185FA5' : '#854F0B';

    html += `<div class="quiz-complete">
      <div class="complete-emoji">${emoji}</div>
      <div class="score-ring">
        <svg width="88" height="88" viewBox="0 0 88 88">
          <circle cx="44" cy="44" r="36" fill="none" stroke="#F2F1ED" stroke-width="8"/>
          <circle cx="44" cy="44" r="36" fill="none" stroke="${ringColor}" stroke-width="8"
            stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"
            stroke-linecap="round" transform="rotate(-90 44 44)" style="transition:stroke-dashoffset 0.8s ease"/>
        </svg>
        <div>
          <div class="score-num" style="color:${ringColor}">${score}%</div>
          <div class="score-label">${correctCount}/${totalQ}</div>
        </div>
      </div>
      <div class="complete-title">${score === 100 ? 'Perfect Score!' : score >= 80 ? 'Great Work!' : score >= 60 ? 'Keep Going!' : 'Keep Studying!'}</div>
      <div class="complete-sub">${failsLeft > 0
        ? `<strong style="color:#A32D2D">${failsLeft} question${failsLeft>1?'s':''} marked for review</strong><br>Retrying will prioritise those first.`
        : 'All questions answered correctly. Outstanding!'}</div>
      <button class="retry-btn" onclick="retryQuiz('${id}')">
        ${failsLeft > 0 ? `🔁 Retry · Focus on ${failsLeft} weak spot${failsLeft>1?'s':''}` : '🔁 Retake Quiz'}
      </button>
      ${failsLeft > 0 ? '<p class="retry-note">Failed questions always appear first on retry.</p>' : ''}
    </div>`;

  } else {
    const qIdx = queue[cursor];
    const q = questions[qIdx];
    const wasWrong = qs.failedIdxs.has(qIdx);
    const isAnswered = session.answered.hasOwnProperty(qIdx);
    const chosenIdx = session.answeredChoice[qIdx];

    // progress row — just counter + bar, no %
    html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap">${cursor + 1} / ${totalQ}</span>
      <div class="quiz-progress" style="flex:1"><div class="quiz-progress-fill" style="width:${progressPct}%"></div></div>
      ${isAnswered
        ? `<span class="stat-pill ${session.answered[qIdx] ? 'stat-correct' : 'stat-wrong'}" style="font-size:10px;padding:2px 8px">${session.answered[qIdx] ? '✓' : '✗'}</span>`
        : ''}
    </div>

    <div class="question-card ${wasWrong ? 'was-wrong' : ''}">
      ${wasWrong ? '<div class="q-wrong-flag">⚑ Needs review</div>' : ''}
      <div class="q-text">${q.q}</div>
      <div class="options">`;

    q.opts.forEach((opt, optIdx) => {
      let cls = 'option-btn';
      if (isAnswered) {
        cls += ' disabled';
        if (optIdx === q.ans) cls += ' reveal-correct';
        else if (optIdx === chosenIdx) cls += ' selected-wrong';
        else cls += ' dim-out';
      }
      html += `<button class="${cls}" onclick="answerQ('${id}', ${qIdx}, ${optIdx})">${opt}</button>`;
    });

    html += `</div>
      <div class="explanation ${isAnswered ? 'show' : ''}">${q.exp}</div>`;

    if (isAnswered) {
      const isLast = cursor >= totalQ - 1;
      html += `<button class="next-btn" onclick="nextQuestion('${id}')">
        <span class="next-btn-timer"></span>
        ${isLast ? 'See Results →' : 'Next Question →'}
      </button>`;
    }

    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById('pageContent').innerHTML = html;
  document.getElementById('scrollArea').scrollTo({ top: 0, behavior: 'smooth' });
}

function answerQ(cardId, qIdx, choiceIdx) {
  const q = QUIZZES[cardId][qIdx];
  const session = getSession(cardId);
  const qs = getCardQuizState(cardId);

  if (session.answered.hasOwnProperty(qIdx)) return;

  const correct = choiceIdx === q.ans;
  session.answered[qIdx] = correct;
  session.answeredChoice[qIdx] = choiceIdx;

  // Update persistent fail tracking
  if (correct) {
    qs.failedIdxs.delete(qIdx);
  } else {
    qs.failedIdxs.add(qIdx);
  }
  qs.attempts.push({ qIdx, correct, ts: Date.now() });
  saveStorage();
  updateFailBadge();
  renderQuiz(cardId);

  // Auto-advance after 5 seconds
  clearTimeout(window._autoAdvance);
  window._autoAdvance = setTimeout(() => {
    const s = getSession(cardId);
    if (!s.complete && s.answered.hasOwnProperty(qIdx)) {
      nextQuestion(cardId);
    }
  }, 5000);
}

function nextQuestion(cardId) {
  clearTimeout(window._autoAdvance);
  const session = getSession(cardId);
  const totalQ = session.queue.length;

  if (session.cursor >= totalQ - 1) {
    session.complete = true;
    buildNav();
    updateDesktopHeader();
  } else {
    session.cursor++;
  }

  updateFailBadge();
  renderQuiz(cardId);
}

function retryQuiz(cardId) {
  quizSession[cardId] = { answered: {}, answeredChoice: {}, queue: null, cursor: 0, complete: false };
  renderQuiz(cardId);
}

function goBack() {
  if (!navHistory.length) return;
  const prev = navHistory.pop();
  current = prev;
  buildNav();
  updateDesktopHeader();
  renderCurrentView();
}

// ─────────────────────────────────────────────
// RESULTS PAGE
// ─────────────────────────────────────────────
function renderResults() {
  const order = ['router','switch','osi','ip','firewall','wap','ports','s00l00','s00l01'];
  const labels = { router:'Router', switch:'Switch', osi:'OSI Model', ip:'IP Addressing', firewall:'Firewall', wap:'Wireless / WAP', ports:'Well-Known Ports', s00l00:'What is a Network?', s00l01:'What is a Switch?' };

  // Global totals
  let globalAnswered = 0, globalCorrect = 0, globalFailed = 0, globalTotal = 0;
  order.forEach(id => {
    const q = QUIZZES[id];
    if (!q) return;
    const qs = getCardQuizState(id);
    const session = quizSession[id];
    const answered = session ? Object.keys(session.answered).length : 0;
    const correct = session ? Object.values(session.answered).filter(Boolean).length : 0;
    globalAnswered += answered;
    globalCorrect += correct;
    globalFailed += qs.failedIdxs.size;
    globalTotal += q.length;
  });

  let html = `<div class="page visible">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:17px;font-weight:700;color:var(--text)">Results</div>
      <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">${globalCorrect}✓ &nbsp;${globalFailed}✗ &nbsp;${globalAnswered}/${globalTotal}</div>
    </div>`;

  order.forEach(id => {
    const q = QUIZZES[id];
    if (!q) return;
    const c = CARDS[id];
    const qs = getCardQuizState(id);
    const session = quizSession[id];
    const totalQ = q.length;
    const answered = session ? Object.keys(session.answered).length : 0;
    const correct = session ? Object.values(session.answered).filter(Boolean).length : 0;
    const failed = qs.failedIdxs.size;
    const untouched = !session || answered === 0;
    const pct = totalQ ? Math.round((correct / totalQ) * 100) : 0;
    const barColor = pct === 100 ? '#0F6E56' : pct >= 60 ? '#185FA5' : pct > 0 ? '#854F0B' : '#D3D1C7';

    if (untouched) {
      html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px;opacity:0.45">
        <div style="width:30px;height:30px;border-radius:8px;background:${c.iconBg};color:${c.iconColor};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:monospace;flex-shrink:0">${c.icon}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text);flex:1">${labels[id]}</div>
        <div style="font-size:11px;color:var(--muted)">Not started</div>
      </div>`;
      return;
    }

    html += `<div class="result-card">
      <div class="result-card-header">
        <div class="icon-badge" style="background:${c.iconBg};color:${c.iconColor};width:36px;height:36px;font-size:11px;border-radius:9px">${c.icon}</div>
        <div style="flex:1;min-width:0">
          <div class="result-name">${labels[id]}</div>
          <div style="font-size:10px;color:var(--muted)">${c.objLabel}</div>
        </div>
        <div style="font-size:18px;font-weight:800;color:${barColor}">${pct}%</div>
      </div>
      <div class="result-counts">
        <span class="result-count-pill" style="background:var(--l4);color:var(--l4t)">✓ ${answered}/${totalQ} answered</span>
        <span class="result-count-pill" style="background:var(--sec);color:var(--sect)">✗ ${correct < answered ? answered - correct : 0}/${totalQ} failed</span>
      </div>
      <div class="result-bar-wrap">
        <div class="result-bar-fill" style="width:${pct}%;background:${barColor}"></div>
      </div>
      ${failed > 0
        ? `<button class="result-review-btn" onclick="goToReview('${id}')">⚑ Review ${failed} marked question${failed > 1 ? 's' : ''}</button>`
        : `<div style="font-size:12px;color:var(--l4t);font-weight:600">✓ All questions cleared</div>`}
    </div>`;
  });

  html += `</div>`;
  document.getElementById('pageContent').innerHTML = html;
}

function goToReview(id) {
  showCard(id, true);
  setView('quiz');
}

// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
loadStorage();
applyLayout();
buildNav();
updateDesktopHeader();
renderCurrentView();
</script>
</body>
</html>
