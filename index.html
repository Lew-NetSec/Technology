<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080b0f;
    --surface: #0d1117;
    --border:  #1c2330;
    --text:    #cdd9e5;
    --muted:   #566573;
    --accent1: #1ba8ff;
    --accent2: #34d399;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* subtle scanline */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  header {
    margin-bottom: 48px;
  }

  .title {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .title span {
    color: #ffffff;
  }

  .subtitle {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* divider line */
  .divider {
    width: 48px;
    height: 2px;
    background: #ffffff;
    border-radius: 2px;
    margin: 20px auto 0;
  }

  /* cards */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 20px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    text-align: left;
  }

  .card:hover {
    border-color: var(--card-accent);
    background: #0f1520;
    transform: translateY(-2px);
  }

  .card-icon {
    font-size: 1.6rem;
    flex-shrink: 0;
    line-height: 1;
  }

  .card-body { flex: 1; }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 900;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #ffffff;
    margin-bottom: 3px;
  }

  .card-desc {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  .card-arrow {
    font-size: 0.9rem;
    color: var(--border);
    flex-shrink: 0;
    transition: color 0.2s, transform 0.2s;
  }

  .card:hover .card-arrow {
    color: var(--card-accent);
    transform: translateX(3px);
  }

  /* individual accent colours */
  .card-cli   { --card-accent: var(--accent1); }
  .card-clock { --card-accent: var(--accent2); }

  footer {
    margin-top: 48px;
    font-size: 0.58rem;
    color: #1e2a35;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title">Network <span>Tools</span></div>
    <div class="subtitle">Quick Reference Pages</div>
    <div class="divider"></div>
  </header>

  <div class="cards">

    <a class="card card-cli" href="cli_sheet.html">
      <span class="card-icon">🖥️</span>
      <div class="card-body">
        <div class="card-title">CLI Commands</div>
        <div class="card-desc">Networking commands for Cisco, FortiGate, UniFi, Huawei, Windows & PuTTY</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card card-clock" href="port_clock.html">
      <span class="card-icon">🔌</span>
      <div class="card-body">
        <div class="card-title">Port Clock</div>
        <div class="card-desc">Port study</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

  </div>

  <footer>github.io &nbsp;·&nbsp; network tools</footer>

</div>
</body>
</html>
